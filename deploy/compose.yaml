services:
  postgres:
    image: postgres:18.1
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    environment:
      - POSTGRES_USER=${DATABASE_USERNAME:-postgres}
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD:-postgres}
      - POSTGRES_DB=${DATABASE_NAME:-hookah_db}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DATABASE_USERNAME:-postgres} -d ${DATABASE_NAME:-hookah_db}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    image: ${HOOKAH_DB_API_IMAGE:-ghcr.io/koshmarus/hookah-db:latest}
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_USERNAME=${DATABASE_USERNAME:-postgres}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD:-postgres}
      - DATABASE_NAME=${DATABASE_NAME:-hookah_db}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - PARSER_CRON_ENABLED=${PARSER_CRON_ENABLED:-false}
    restart: unless-stopped

volumes:
  postgres_data:
