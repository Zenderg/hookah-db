name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18.1
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hookah_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d hookah_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_HOST: localhost
      DATABASE_PORT: 5432
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_NAME: hookah_db
      CORS_ORIGIN: "*"
      PARSER_CRON_ENABLED: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint:check

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Unit tests
        run: npm test

      - name: Verify sample seed
        run: npm run seed:sample:dev

      - name: Build
        run: npm run build
